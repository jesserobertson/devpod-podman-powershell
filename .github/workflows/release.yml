name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0
          $result = Invoke-Pester -Path tests\init.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows binary
        run: GOOS=windows GOARCH=amd64 go build -o init_windows_amd64.exe .

      - name: Compute checksum
        id: checksum
        run: |
          SHA=$(sha256sum init_windows_amd64.exe | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "Checksum: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            init_windows_amd64.exe
            scripts/init.ps1
            provider.yaml
          body: |
            ## Install

            ```
            devpod provider add https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/provider.yaml
            ```

            **init_windows_amd64.exe SHA256:** `${{ steps.checksum.outputs.sha256 }}`
